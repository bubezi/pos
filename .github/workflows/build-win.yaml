name: Build Windows Installer New

on:
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: beauty-pos

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: beauty-pos/package-lock.json

      - name: Show files
        run: dir

      - name: Install dependencies without scripts
        run: npm ci --ignore-scripts

      - name: Install Electron app deps
        run: npx electron-builder install-app-deps

      - name: Build app
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win nsis --publish never

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wigsnstyle-pos-windows-installer-new
          path: |
            beauty-pos/dist/*.exe
            beauty-pos/dist/*.blockmap
